# Render Blueprint for Humain DecisionOps Backend
# Deploy to Render free tier

services:
  - type: web
    name: humain-decisionops-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false  # Set manually to Neon connection string
      - key: CORS_ALLOW_ORIGINS
        value: https://humain-decisionops.vercel.app,http://localhost:3000
      - key: HEURISTIC_MODE
        value: "true"  # Default to heuristic mode on free tier
      - key: SEED_ON_STARTUP
        value: "false"
      - key: OPENAI_API_KEY
        sync: false  # Optional: set if you have an API key
      - key: LANGSMITH_API_KEY
        sync: false  # Optional: set for tracing
      - key: AUTH_ENABLED
        value: "false"
      - key: LOG_LEVEL
        value: INFO
    healthCheckPath: /health
    autoDeploy: true
